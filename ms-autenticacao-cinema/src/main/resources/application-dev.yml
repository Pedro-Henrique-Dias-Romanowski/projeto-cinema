server:
  port: 8084

URL_CLIENTE_SERVICE: http://localhost:8080

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,circuitbreakerevents,ratelimiters,retries,bulkheads
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    circuitbreakers:
      enabled: true
    ratelimiters:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    base-url: http://localhost:9411
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
spring:
  application:
    name: ms-autenticacao-cinema
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/cinema_autenticacao
    username: root
    password: 121105
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
    show-sql: false
    open-in-view: false
  security:
    jwt:
      secret: ${JWT_SECRET:fT8X27NnYKddsmTlJMIbwf2XvXPvBHdEP4C1iI4qZSU=}

feign:
  client:
    config:
      default:
        connectTimeout: 2000
        readTimeout: 5000
        loggerLevel: BASIC
      cliente-service:
        connectTimeout: 2000
        readTimeout: 5000
        loggerLevel: FULL

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    use-root-path: false
  api-docs:
    path: /v3/api-docs
    enabled: true

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 5s
        recordExceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.util.concurrent.TimeoutException
          - java.io.IOException
          - feign.FeignException
    instances:
      clienteService:
        baseConfig: default
        waitDurationInOpenState: 15s
        slidingWindowSize: 20
        minimumNumberOfCalls: 10

  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.util.concurrent.TimeoutException
          - java.io.IOException
          - feign.FeignException.ServiceUnavailable
          - feign.FeignException.InternalServerError
          - feign.RetryableException
        ignoreExceptions:
          - feign.FeignException.BadRequest
          - feign.FeignException.Unauthorized
          - feign.FeignException.Forbidden
          - feign.FeignException.NotFound
    instances:
      clienteService:
        baseConfig: default
        maxAttempts: 3
        waitDuration: 500ms

  ratelimiter:
    configs:
      default:
        registerHealthIndicator: true
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 500ms
    instances:
      clienteService:
        baseConfig: default
        limitForPeriod: 30
      loginService:
        baseConfig: default
        limitForPeriod: 30

  bulkhead:
    configs:
      default:
        maxConcurrentCalls: 10
        maxWaitDuration: 1s
    instances:
      clienteService:
        baseConfig: default
        maxConcurrentCalls: 5

  timelimiter:
    configs:
      default:
        timeoutDuration: 3s
        cancelRunningFuture: true
    instances:
      clienteService:
        baseConfig: default
        timeoutDuration: 5s

