# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 5s
        recordExceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.util.concurrent.TimeoutException
          - java.io.IOException
          - feign.FeignException
    instances:
      clienteService:
        baseConfig: default
        waitDurationInOpenState: 15s
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
      catalogoService:
        baseConfig: default
        waitDurationInOpenState: 15s
        slidingWindowSize: 20
        minimumNumberOfCalls: 10

  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.util.concurrent.TimeoutException
          - java.io.IOException
          - feign.FeignException
        ignoreExceptions:
          - com.romanowski.pedro.exceptions.BusinessException
    instances:
      clienteService:
        baseConfig: default
        maxAttempts: 3
        waitDuration: 500ms
      catalogoService:
        baseConfig: default
        maxAttempts: 3
        waitDuration: 500ms

  ratelimiter:
    configs:
      default:
        registerHealthIndicator: true
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 500ms
    instances:
      reservaService:
        baseConfig: default
        limitForPeriod: 10
      sessaoService:
        baseConfig: default
        limitForPeriod: 30

  timelimiter:
    configs:
      default:
        timeoutDuration: 3s
        cancelRunningFuture: true
    instances:
      catalogoService:
        baseConfig: default
        timeoutDuration: 5s
      clienteService:
        baseConfig: default
        timeoutDuration: 5s
